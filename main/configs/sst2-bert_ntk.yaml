disk_reader: !EasyReader &id_disk_reader
  args:
    dataset_name: sst2

dataset: !FastListDataset &id_dataset
  args:
    device: cuda:0
    batchsize: 16
    # model_string: roberta-base # bert-base-uncased
    model_string: bert-base-uncased
    seq_len: 64
  data_loader: *id_disk_reader
  prompt: True
  mapping: "{'0':'terrible','1':'great'}"
  template: "*cls**sent_0*_It_was*mask*.*sep+*"
  first_sent_limit: 60

probe_com: !NTKProbePS &id_probe_com
  args:
    device: cuda:0
    seed: 2023
    dataset: sst2
    # model: roberta-base # bert-base-uncased
    model: bert-base-uncased
    datadir: ./datasets
    savedir: ./ntks
    logdir: null
    workers_per_device: 1
    grad_chunksize: 2000000 # adjust this value if memory is insufficient: 10000000
    mm_col_chunksize: 20000
    loader_batch_size: 256  # adjust this value if memory is insufficient: 16
    loader_num_workers: 0  # when memory is pinned, don't set this to non-zero values: 1
    pin_memory: False # setting it to true will cause cpu to stuck at termination (might have a fix though)
    allow_tf32: False
    benchmark: False
    deterministic: True
    ntk_dtype: float16 # Changed from float32
    num_frozen_layers: 8
    debug: False
    prompt: True
    correction: False
    single_kernel: True
  num_labels: 2

dshap_com: !FreeShap
  dataset: *id_dataset
  probe_model: *id_probe_com
  num_metric: 2
